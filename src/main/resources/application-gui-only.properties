#
#gui-only profile: server disabled.
# JPA/Hibernate/Hikari/Security/WebMvc excludes: GuiOnlyEnvironmentPostProcessor
# (spring.autoconfigure.exclude here is too late for AutoConfigurationImportSelector)
#

#Disable embedded server
server.enabled=false

#Disable web-server
spring.main.web-application-type=none

spring.sql.init.mode=never

# --- optional: deep startup diagnostics (uncomment for a session, then re-comment) ---
#logging.level.org.springframework.boot=DEBUG
#logging.level.org.springframework.boot.autoconfigure=DEBUG
#logging.level.org.springframework.context.annotation=DEBUG
#logging.level.org.springframework.beans.factory=DEBUG
